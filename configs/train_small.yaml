# LLM Foundry Simulator — 小模型训练配置（适合 8GB 显存）
# 模型规模: ~30M 参数

model:
  vocab_size: 10000       # 我们训练的 BPE tokenizer 词表大小
  context_length: 256     # 较短的上下文窗口（节省显存）
  d_model: 256            # 小模型隐层维度
  n_layers: 4             # 减少层数
  n_heads: 4              # 注意力头数
  d_ff: 1024              # FFN 中间层维度
  rope_theta: 10000.0     # RoPE 基础频率
  use_flash_attn: true    # 启用 Flash Attention

training:
  data_path: data/train_tokens.bin  # tokenized 数据文件
  device: auto                      # 自动选择设备：cuda > cpu
  batch_size: 8                     # 小 batch size
  gradient_accumulation_steps: 2    # 梯度累积
  max_steps: 1000                   # 较少步数（测试用）
  lr: 3.0e-4                        # 学习率
  min_lr: 3.0e-5                    # 最小学习率
  warmup_steps: 100                 # 预热步数
  weight_decay: 0.1                 # 权重衰减
  grad_clip: 1.0                    # 梯度裁剪
  save_interval: 200                # 保存间隔
  log_interval: 10                  # 日志间隔

output:
  base_dir: results/train           # 训练结果目录
