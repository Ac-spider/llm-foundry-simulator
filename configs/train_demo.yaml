# 临时配置文件 - 用于演示 GPU 使用
model:
  vocab_size: 10000
  context_length: 256
  d_model: 256
  num_layers: 4
  num_heads: 4
  d_ff: 1024
  rope_theta: 10000.0
  use_flash_attn: true

training:
  data_path: data/train_tokens.bin
  device: auto
  batch_size: 8
  gradient_accumulation_steps: 2
  max_steps: 50
  lr: 3.0e-4
  min_lr: 3.0e-5
  warmup_steps: 10
  weight_decay: 0.1
  grad_clip: 1.0
  save_interval: 1000
  log_interval: 10

output:
  base_dir: results/train_demo
