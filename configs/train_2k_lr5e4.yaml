# 2000步训练配置 - 学习率 5e-4 (激进)
model:
  vocab_size: 10000
  context_length: 256
  d_model: 256
  n_layers: 4
  n_heads: 4
  d_ff: 1024
  rope_theta: 10000.0
  use_flash_attn: true

training:
  data_path: data/train_tokens.bin
  device: auto
  batch_size: 8
  gradient_accumulation_steps: 2
  max_steps: 2000
  lr: 5.0e-4
  min_lr: 5.0e-5
  warmup_steps: 100
  weight_decay: 0.1
  grad_clip: 1.0
  save_interval: 500
  log_interval: 50

output:
  base_dir: results/train_2k_lr5e4
